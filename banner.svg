<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Towfique Hasan Jayead GitHub Profile Banner</title>
  <desc id="desc">Professional developer banner for a Backend Engineer.</desc>

  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      
      .name { font-weight: 800; fill: #c9d1d9; letter-spacing: -0.5px; }
      .sub { font-size: 20px; font-weight: 400; fill: #8b949e; }
      .code { font-size: 20px; font-weight: 600; fill: #7ee787; }
      
      .window-text { font-size: 16px; }
      .key { fill: #7ee787; font-weight: 600; }
      .string { fill: #a5d6ff; }
      .punct { fill: #c9d1d9; }
      
      .cursor { animation: blink 1s steps(2, start) infinite; }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      .bg-grid { stroke: #30363d; stroke-width: 1; opacity: 0.15; }
    </style>
    
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" class="bg-grid" />
    </pattern>

    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#238636" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" rx="15" fill="#0d1117" />
  <rect width="1200" height="360" rx="15" fill="url(#grid)" />
  
  <!-- Subtle Gradient overlay -->
  <rect x="0" y="0" width="600" height="360" rx="15" fill="url(#glow)" />

  <!-- Left Side: Profile Text -->
  <g transform="translate(60, 0)">
    <text class="mono code" x="0" y="140">&gt; ./hello_world.sh<tspan class="cursor">_</tspan></text>
    <text class="sans name" x="0" y="200" font-size="44px">Towfique Hasan Jayead</text>
    <text class="sans sub" x="2" y="240">Laravel Developer • Backend Engineer</text>
    
    <!-- Subtle separator -->
    <path d="M 2 270 L 60 270" stroke="#30363d" stroke-width="3" />
    
    <text class="sans sub" x="2" y="305" font-size="16px" fill="#8b949e">Building robust &amp; scalable backend applications</text>
  </g>

  <!-- Right Side: Code Window -->
  <g transform="translate(560, 15)">
    <!-- Window Background -->
    <rect x="0" y="0" width="600" height="330" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" />
    
    <!-- Window Controls -->
    <circle cx="20" cy="20" r="6" fill="#ff5f56" />
    <circle cx="40" cy="20" r="6" fill="#ffbd2e" />
    <circle cx="60" cy="20" r="6" fill="#27c93f" />
    <text class="mono punct" x="300" y="24" font-size="12px" text-anchor="middle" opacity="0.5">profile.json</text>
    <path d="M 0 40 L 600 40" stroke="#30363d" stroke-width="1" />

    <!-- Code Content -->
    <text class="mono window-text" x="20" y="70"><tspan class="punct">{</tspan></text>
    
    <text class="mono window-text" x="40" y="96">
      <tspan class="key">"name"</tspan><tspan class="punct">:</tspan> <tspan class="string">"Towfique Hasan Jayead"</tspan><tspan class="punct">,</tspan>
    </text>
    
    <text class="mono window-text" x="40" y="122">
      <tspan class="key">"role"</tspan><tspan class="punct">:</tspan> <tspan class="string">"Backend Engineer"</tspan><tspan class="punct">,</tspan>
    </text>

    <text class="mono window-text" x="40" y="148">
      <tspan class="key">"skills"</tspan><tspan class="punct">:</tspan> <tspan class="punct">[</tspan>
    </text>
    <text class="mono window-text" x="60" y="174">
      <tspan class="string">"Laravel"</tspan><tspan class="punct">, </tspan><tspan class="string">"PHP"</tspan><tspan class="punct">, </tspan><tspan class="string">"MySQL"</tspan><tspan class="punct">, </tspan><tspan class="string">"PostgreSQL"</tspan><tspan class="punct">,</tspan>
    </text>
    <text class="mono window-text" x="60" y="200">
      <tspan class="string">"Docker"</tspan><tspan class="punct">, </tspan><tspan class="string">"Linux"</tspan><tspan class="punct">, </tspan><tspan class="string">"React.js"</tspan>
    </text>
    <text class="mono window-text" x="40" y="226"><tspan class="punct">],</tspan></text>

    <text class="mono window-text" x="40" y="252">
      <tspan class="key">"experience"</tspan><tspan class="punct">:</tspan> <tspan class="string">"3+ years"</tspan><tspan class="punct">,</tspan>
    </text>

    <text class="mono window-text" x="40" y="278">
      <tspan class="key">"status"</tspan><tspan class="punct">:</tspan> <tspan class="string">"Open to opportunities"</tspan>
    </text>

    <text class="mono window-text" x="20" y="304"><tspan class="punct">}</tspan></text>
  </g>
</svg>
